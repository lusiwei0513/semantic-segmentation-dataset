# UNet-R34 side — 对齐 SegFormer 侧视 letterbox 384×1536（保留长宽比）
# 原 384×384 方图会把 ~4.5:1 侧视压到高度约 85px；本配置约 4× 有效分辨率

data:
  mode: side
  prepared_dir: ../data_unet/side
  fold_json: ../data/side/splits/fold_0.json
  image_size: [384, 1536]   # [H, W] letterbox，不拉伸
  val_ratio: 0.2
  seed: 42
  class_names: [background, body, windshield, bogie, door]

model:
  arch: Unet
  encoder: resnet34
  encoder_weights: imagenet
  num_classes: 5

train:
  epochs: 100
  batch_size: 1          # 4GB：宽画布降 batch
  lr: 5.0e-5
  weight_decay: 5.0e-4
  num_workers: 0
  amp: true
  early_stop_patience: 25
  strong_aug: true
  class_weights: [0.2, 1.0, 4.5, 2.5, 3.5]
  dice_weight: 1.0
  ce_weight: 1.0

paths:
  output_dir: outputs/unet_seg
  run_name: side_unet_wide_384x1536
