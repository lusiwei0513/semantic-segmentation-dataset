data:
  mode: side
  prepared_dir: ../data_unet/side
  fold_json: ../data/side/splits/fold_0.json
  image_size: 384
  val_ratio: 0.2
  seed: 42
  class_names:
  - background
  - body
  - windshield
  - bogie
  - door
model:
  arch: DeepLabV3Plus
  encoder: resnet34
  encoder_weights: imagenet
  num_classes: 5
train:
  epochs: 100
  batch_size: 2
  lr: 5.0e-05
  weight_decay: 0.0005
  num_workers: 0
  amp: true
  early_stop_patience: 20
  strong_aug: true
  class_weights:
  - 0.2
  - 1.0
  - 4.0
  - 2.5
  - 3.5
  dice_weight: 1.0
  ce_weight: 1.0
paths:
  output_dir: outputs/deeplab
  run_name: side_deeplab_square_384
