# Side from data_unet/side (teammate-format converted)
# Classes: 0 bg, 1 body, 2 windshield, 3 bogie, 4 door  | mIoU excludes background

data:
  mode: side
  prepared_dir: ../data_unet/side
  image_size: 384
  val_ratio: 0.2
  seed: 42
  class_names: [background, body, windshield, bogie, door]

model:
  arch: Unet
  encoder: resnet34
  encoder_weights: imagenet
  num_classes: 5

train:
  epochs: 80
  batch_size: 1
  lr: 1.0e-4
  weight_decay: 1.0e-4
  num_workers: 0
  amp: true
  early_stop_patience: 15
  class_weights: [0.2, 1.0, 3.5, 2.5, 3.0]
  dice_weight: 1.0
  ce_weight: 1.0

paths:
  output_dir: outputs
  run_name: unet_resnet34_data_side
