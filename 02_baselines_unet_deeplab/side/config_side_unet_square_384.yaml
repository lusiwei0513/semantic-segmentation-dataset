# UNet-R34 side tune — same data/fold_0 as DeepLab v2 for fair comparison
# Classes: 0 bg, 1 body, 2 windshield, 3 bogie, 4 door

data:
  mode: side
  prepared_dir: ../data_unet/side
  fold_json: ../data/side/splits/fold_0.json
  image_size: 384
  val_ratio: 0.2
  seed: 42
  class_names: [background, body, windshield, bogie, door]

model:
  arch: Unet
  encoder: resnet34
  encoder_weights: imagenet
  num_classes: 5

train:
  epochs: 100
  batch_size: 2
  lr: 5.0e-5
  weight_decay: 5.0e-4
  num_workers: 0
  amp: true
  early_stop_patience: 25
  strong_aug: true
  class_weights: [0.2, 1.0, 4.5, 2.5, 3.5]
  dice_weight: 1.0
  ce_weight: 1.0

paths:
  output_dir: outputs/unet_seg
  run_name: side_unet_square_384
