data:
  mode: front
  prepared_dir: ../data_unet/front
  keypoints_dir: ../data/front/processed/keypoints
  fold_json: ../data/front/splits/fold_0.json
  image_size: 512
  val_ratio: 0.2
  seed: 42
  tip_sigma: 12.0
  tip_ellipse_rx: 24
  tip_ellipse_ry: 12
  class_names:
  - background
  - body
  - windshield
  - nose_tip
model:
  arch: Unet
  encoder: resnet34
  encoder_weights: imagenet
  seg_classes: 3
train:
  epochs: 100
  batch_size: 2
  lr: 5.0e-05
  weight_decay: 0.0005
  num_workers: 0
  amp: true
  early_stop_patience: 25
  strong_aug: true
  class_weights:
  - 0.2
  - 1.0
  - 2.5
  dice_weight: 1.0
  ce_weight: 1.0
  heat_weight: 2.0
  heat_peak_boost: 40.0
  tip_coord_weight: 0.5
  soft_argmax_temp: 0.1
paths:
  output_dir: outputs/unet_kp
  run_name: front_unet_kp_tune
