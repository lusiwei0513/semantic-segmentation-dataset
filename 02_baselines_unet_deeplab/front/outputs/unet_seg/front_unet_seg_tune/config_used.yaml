data:
  prepared_dir: ../data_unet/front
  fold_json: ../data/front/splits/fold_0.json
  image_size: 512
  val_ratio: 0.2
  test_ratio: 0.0
  seed: 42
  class_names:
  - background
  - body
  - windshield
  - nose_tip
  tip_ellipse_rx: 24
  tip_ellipse_ry: 12
model:
  arch: Unet
  encoder: resnet34
  encoder_weights: imagenet
  num_classes: 4
train:
  epochs: 100
  batch_size: 2
  lr: 5.0e-05
  weight_decay: 0.0005
  num_workers: 0
  amp: true
  early_stop_patience: 25
  strong_aug: true
  class_weights:
  - 0.2
  - 1.0
  - 2.5
  - 5.5
  dice_weight: 1.0
  ce_weight: 1.0
paths:
  output_dir: outputs/unet_seg
  run_name: front_unet_seg_tune
