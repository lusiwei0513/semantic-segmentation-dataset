# Front from data_unet/front (teammate-format converted)
# Classes: 0 bg, 1 body, 2 windshield, 3 nose_tip  | mIoU excludes background

data:
  prepared_dir: ../data_unet/front
  image_size: 512
  val_ratio: 0.2
  seed: 42
  class_names: [background, body, windshield, nose_tip]

model:
  arch: Unet
  encoder: resnet34
  encoder_weights: imagenet
  num_classes: 4

train:
  epochs: 100
  batch_size: 2
  lr: 1.0e-4
  weight_decay: 1.0e-4
  num_workers: 0
  amp: true
  early_stop_patience: 20
  class_weights: [0.2, 1.0, 2.5, 4.0]
  dice_weight: 1.0
  ce_weight: 1.0

paths:
  output_dir: outputs
  run_name: unet_resnet34_data_front
