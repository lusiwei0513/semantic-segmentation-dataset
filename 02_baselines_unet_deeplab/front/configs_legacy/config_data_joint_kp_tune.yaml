# Joint KP dual-head — fold from front+side mirrored ids when available;
# falls back to val_ratio split if no joint fold. Tip only on front samples.
# Seg train ids (5): bg, body, win, bogie, door | tip via heatmap
# Eval: expand to 6-cls + peak ellipse as nose_tip

data:
  mode: joint
  prepared_dir: ../data_unet/joint
  keypoints_dir: ../data/front/processed/keypoints
  fold_json: ../data/splits/fold_0_joint.json
  image_size: 512
  val_ratio: 0.2
  seed: 42
  tip_sigma: 12.0
  tip_ellipse_rx: 24
  tip_ellipse_ry: 12
  class_names: [background, body, windshield, nose_tip, bogie, door]

model:
  arch: Unet
  encoder: resnet34
  encoder_weights: imagenet
  seg_classes: 5

train:
  epochs: 100
  batch_size: 2
  lr: 5.0e-5
  weight_decay: 5.0e-4
  num_workers: 0
  amp: true
  early_stop_patience: 25
  strong_aug: true
  # bg, body, win, bogie, door
  class_weights: [0.2, 1.0, 2.5, 2.5, 3.0]
  dice_weight: 1.0
  ce_weight: 1.0
  heat_weight: 2.0
  heat_peak_boost: 40.0
  tip_coord_weight: 0.5
  soft_argmax_temp: 0.1

paths:
  output_dir: outputs
  run_name: unet_resnet34_data_joint_kp_tune_v2
