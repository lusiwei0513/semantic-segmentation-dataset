# Joint front+side from data_unet/joint
# Classes: 0 bg, 1 body, 2 windshield, 3 nose_tip, 4 bogie, 5 door
# Letterbox 512 for mixed aspect ratios; mIoU excludes background

data:
  prepared_dir: ../data_unet/joint
  image_size: 512
  val_ratio: 0.2
  seed: 42
  class_names: [background, body, windshield, nose_tip, bogie, door]

model:
  arch: Unet
  encoder: resnet34
  encoder_weights: imagenet
  num_classes: 6

train:
  epochs: 100
  batch_size: 2
  lr: 1.0e-4
  weight_decay: 1.0e-4
  num_workers: 0
  amp: true
  early_stop_patience: 20
  class_weights: [0.2, 1.0, 2.5, 4.0, 2.5, 3.0]
  dice_weight: 1.0
  ce_weight: 1.0

paths:
  output_dir: outputs
  run_name: unet_resnet34_data_joint
