data_root: .
metadata_csv: ./metadata.csv
output_dir: ./outputs/domain_diagnosis

columns:
  sample_id: sample_id
  image_path: image_path
  vehicle_id: vehicle_id
  view: view
  device_id: device_id

valid_views:
  - front
  - side

image:
  resize_for_embedding: 224
  dark_threshold: 15
  bright_threshold: 240

embedding:
  model: resnet50
  batch_size: 16
  num_workers: 0
  device: auto

probe:
  n_splits: 5
  random_state: 42
  min_samples_per_class: 5
