# 冲分微调：针对 side windshield / door / bogie
# 从 fold_0 best.pt 继续训，不要从零开始
model:
  name: segformer_b0_multitask
  pretrained: true
  backbone: nvidia/mit-b0
  segmentation_channels: [body, windshield, bogie, door]
  keypoint_head: true
  decoder_channels: 256
  keypoint_out_stride: 4

data:
  root: ./data/processed
  metadata: ./data/processed/metadata.csv
  splits_dir: ./data/splits
  front_size: [640, 640]
  # 侧视加分辨率：门/窗/转向架像素太少是主因
  side_size: [512, 1024]
  resize_mode: letterbox
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  batch_size: 4
  num_workers: 0

loss:
  bce_weight: 1.0
  dice_weight: 1.5
  loss_weights:
    body: 0.8
    windshield: 2.5
    bogie: 2.0
    door: 3.0
    nose_tip: 0.5
  # 按面积比粗估：正样本稀少 → 提高 BCE 正类权重
  pos_weights:
    body: 1.0
    windshield: 8.0
    bogie: 8.0
    door: 15.0
  heatmap_sigma: 4

optimizer:
  name: adamw
  # 微调：学习率略降
  backbone_lr: 5.0e-6
  head_lr: 3.0e-5
  weight_decay: 0.01

scheduler:
  name: cosine
  warmup_epochs: 1

training:
  epochs: 30
  amp: true
  gradient_accumulation_steps: 1
  freeze_backbone_epochs: 0
  early_stopping_patience: 10
  grad_clip_norm: 1.0
  seed: 42
  fold: 0
