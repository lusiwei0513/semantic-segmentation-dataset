# 干净数据从头训练：boost 损失/分辨率 + 正常从头学习率
# 不要用 --init-checkpoint；保留 MiT-B0 ImageNet pretrained
model:
  name: segformer_b0_multitask
  pretrained: true
  backbone: nvidia/mit-b0
  segmentation_channels: [body, windshield, bogie, door]
  keypoint_head: true
  decoder_channels: 256
  keypoint_out_stride: 4

data:
  root: ./data/processed
  metadata: ./data/processed/metadata.csv
  splits_dir: ./data/splits
  front_size: [640, 640]
  side_size: [512, 1024]
  resize_mode: letterbox
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  batch_size: 4
  num_workers: 0

loss:
  bce_weight: 1.0
  dice_weight: 1.5
  loss_weights:
    body: 0.8
    windshield: 2.5
    bogie: 2.0
    door: 3.0
    nose_tip: 0.5
  pos_weights:
    body: 1.0
    windshield: 8.0
    bogie: 8.0
    door: 15.0
  heatmap_sigma: 4

optimizer:
  name: adamw
  backbone_lr: 1.0e-5
  head_lr: 1.0e-4
  weight_decay: 0.01

scheduler:
  name: cosine
  warmup_epochs: 3

training:
  epochs: 30
  amp: true
  gradient_accumulation_steps: 1
  freeze_backbone_epochs: 5
  early_stopping_patience: 10
  grad_clip_norm: 1.0
  seed: 42
  fold: 0
