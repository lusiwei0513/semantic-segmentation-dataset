# 侧视图单独训练（对齐 UNet-R34：body/windshield/bogie/door fg-mIoU）
# 公平分辨率：短边 384（与 UNet image_size=384 一致），宽边 letterbox 1536 保留列车长宽比
# VRAM 仅调：bs=1 + AMP + grad_accum=4（有效 batch≈4）；不缩骨干、不砍类别
model:
  name: segformer_b0_multitask
  pretrained: ./pretrained/mit-b0
  backbone: nvidia/mit-b0
  segmentation_channels: [body, windshield, bogie, door]
  keypoint_head: false
  decoder_channels: 256
  keypoint_out_stride: 4

data:
  view: side
  root: ./data_side
  metadata: ./data_side/metadata.csv
  splits_dir: ./splits_side
  front_size: [512, 512]
  side_size: [384, 1536]
  resize_mode: letterbox
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  batch_size: 1
  num_workers: 0

loss:
  bce_weight: 1.0
  dice_weight: 1.5
  loss_weights:
    body: 0.8
    windshield: 2.5
    bogie: 2.0
    door: 3.0
    nose_tip: 0.0
  pos_weights:
    body: 1.0
    windshield: 8.0
    bogie: 8.0
    door: 15.0
  heatmap_sigma: 4

eval:
  tip_ellipse_rx: 24
  tip_ellipse_ry: 12

optimizer:
  name: adamw
  backbone_lr: 5.0e-5
  head_lr: 1.0e-4
  weight_decay: 0.01

scheduler:
  name: cosine
  warmup_epochs: 3

training:
  view: side
  epochs: 80
  amp: true
  gradient_accumulation_steps: 4
  freeze_backbone_epochs: 0
  early_stopping_patience: 20
  grad_clip_norm: 1.0
  seed: 42
  fold: 0
