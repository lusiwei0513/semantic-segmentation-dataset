# 速度优化版训练配置（仍使用 MiT-B0 ImageNet 预训练）
model:
  name: segformer_b0_multitask
  pretrained: true
  backbone: nvidia/mit-b0
  segmentation_channels: [body, windshield, bogie, door]
  keypoint_head: true
  decoder_channels: 256
  keypoint_out_stride: 4

data:
  root: ./data/processed
  metadata: ./data/processed/metadata.csv
  splits_dir: ./data/splits
  # 缩小输入以提速；显存仍充足时可再调大
  front_size: [512, 512]
  side_size: [384, 768]
  resize_mode: letterbox
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  batch_size: 4
  # Windows + 超宽侧视图：worker 过多易 RAM OOM
  num_workers: 0

loss:
  bce_weight: 1.0
  dice_weight: 1.0
  loss_weights:
    body: 1.0
    windshield: 1.0
    bogie: 1.0
    door: 1.0
    nose_tip: 0.5
  heatmap_sigma: 4

optimizer:
  name: adamw
  backbone_lr: 1.0e-5
  head_lr: 1.0e-4
  weight_decay: 0.01

scheduler:
  name: cosine
  warmup_epochs: 3

training:
  epochs: 25
  amp: true
  gradient_accumulation_steps: 2
  freeze_backbone_epochs: 5
  early_stopping_patience: 8
  grad_clip_norm: 1.0
  seed: 42
  fold: 0
